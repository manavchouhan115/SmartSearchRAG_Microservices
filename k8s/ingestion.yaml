apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
      - name: ingestion
        image: smartsearch-ingestion:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "services.ingestion.main:app", "--host", "0.0.0.0", "--port", "8002"]
        ports:
        - containerPort: 8002
        envFrom:
        - configMapRef:
            name: smartsearch-config
        - secretRef:
            name: smartsearch-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
spec:
  selector:
    app: ingestion
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
