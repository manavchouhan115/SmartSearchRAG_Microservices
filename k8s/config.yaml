apiVersion: v1
kind: ConfigMap
metadata:
  name: smartsearch-config
data:
  VECTOR_SERVICE_URL: "http://vector-service:8001"
  INGESTION_SERVICE_URL: "http://ingestion-service:8002"
  AGENT_SERVICE_URL: "http://agent-service:8003"
---
apiVersion: v1
kind: Secret
metadata:
  name: smartsearch-secrets
type: Opaque
stringData:
  HF_TOKEN: "your_huggingface_token_here"
  GROQ_API_KEY: "your_groq_api_key_here"
  JWT_SECRET: "strong-kubernetes-production-jwt-token"
