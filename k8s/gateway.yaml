apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: smartsearch-gateway:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "services.gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: smartsearch-config
        - secretRef:
            name: smartsearch-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  # Using NodePort to expose it publicly if using Minikube locally
  type: NodePort
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080
